<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Joel XMD Web Bot</title>

<style>
* { box-sizing: border-box; font-family: Arial, sans-serif; }
body { margin: 0; background: #0b141a; color: #e9edef; display: flex; flex-direction: column; height: 100vh; }
header { background: #202c33; padding: 12px; font-weight: bold; text-align: center; }
#chat { flex: 1; overflow-y: auto; padding: 10px; }
.msg { max-width: 75%; padding: 10px 14px; margin-bottom: 10px; border-radius: 18px; word-wrap: break-word; box-shadow: 0 2px 6px rgba(0,0,0,0.3); position: relative; }
.msg.user { background: #005c4b; margin-left: auto; text-align: right; }
.msg.bot { background: #1f2c34; margin-right: auto; }
.msg img, .msg video, .msg audio { max-width: 100%; border-radius: 12px; display: block; margin-top: 5px; }
.msg .file { background: rgba(255,255,255,0.1); padding: 8px; border-radius: 10px; display: flex; align-items: center; gap: 10px; }
.msg .file a { color: #fff; text-decoration: none; }
.time { font-size: 10px; color: #999; margin-top: 4px; display: block; }
footer { background: #202c33; padding: 8px; display: flex; gap: 5px; }
input[type="text"] { flex: 1; padding: 8px; border-radius: 6px; border: none; }
input[type="file"] { display: none; }
button { background: #00a884; border: none; padding: 8px 12px; border-radius: 6px; color: #fff; cursor: pointer; }
</style>
</head>
<body>

<header>🤖 Joel XMD Web Bot</header>

<div id="chat"></div>

<footer>
  <label for="file">📎</label>
  <input type="file" id="file" />
  <input type="text" id="input" placeholder="Type a message..." />
  <button id="sendBtn">🎤</button>
</footer>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");
const fileInput = document.getElementById("file");
const sendBtn = document.getElementById("sendBtn");

function getTime() {
  return new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
}

function addMessage(content, cls) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.innerHTML = content + `<span class="time">${getTime()}</span>`;
  chat.appendChild(div);
  chat.scrollTo({ top: chat.scrollHeight, behavior: "smooth" });
}

function send() {
  const text = input.value.trim();
  const file = fileInput.files[0];

  if (!text && !file) return;

  // Send text
  if (text) {
    addMessage(text, "user");
    input.value = "";
  }

  // Send file
  if (file) {
    const url = URL.createObjectURL(file);
    const type = file.type;

    if (type.startsWith("image")) addMessage(`<img src="${url}">`, "user");
    else if (type.startsWith("audio")) addMessage(`<audio controls src="${url}"></audio>`, "user");
    else if (type.startsWith("video")) addMessage(`<video controls src="${url}"></video>`, "user");
    else addMessage(`<div class="file">📄 <a href="${url}" download="${file.name}">${file.name}</a></div>`, "user");

    fileInput.value = "";
  }
}

// Dynamic send button icon
input.addEventListener("input", () => {
  sendBtn.textContent = input.value.trim() ? "📤" : "🎤";
});

// Press Enter to send
input.addEventListener("keypress", e => { if(e.key === "Enter") send(); });
sendBtn.addEventListener("click", send);
</script>

</body>
</html>
