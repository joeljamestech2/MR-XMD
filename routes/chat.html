<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Joel XMD Chat</title>

<style>
* {
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  margin: 0;
  background: #0b141a;
  color: #e9edef;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

header {
  background: #202c33;
  padding: 12px;
  font-weight: bold;
  text-align: center;
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.msg {
  max-width: 80%;
  padding: 8px 10px;
  margin-bottom: 10px;
  border-radius: 10px;
  word-wrap: break-word;
}

.user {
  background: #005c4b;
  margin-left: auto;
}

.bot {
  background: #1f2c34;
  margin-right: auto;
}

.msg img,
.msg video {
  max-width: 100%;
  border-radius: 8px;
}

audio {
  width: 100%;
  margin-top: 5px;
}

.file {
  background: #111;
  padding: 8px;
  border-radius: 6px;
  margin-top: 5px;
}

footer {
  background: #202c33;
  padding: 8px;
  display: flex;
  gap: 5px;
}

input[type="text"] {
  flex: 1;
  padding: 8px;
  border-radius: 6px;
  border: none;
}

input[type="file"] {
  display: none;
}

button {
  background: #00a884;
  border: none;
  padding: 8px 12px;
  border-radius: 6px;
  color: #fff;
  cursor: pointer;
}
</style>
</head>

<body>

<header>🤖 Joel XMD Web Bot</header>

<div id="chat"></div>

<footer>
  <label for="file">
    📎
  </label>
  <input type="file" id="file" />
  <input type="text" id="input" placeholder="Type a command..." />
  <button onclick="send()">Send</button>
</footer>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");
const fileInput = document.getElementById("file");

function addMessage(text, cls) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addMedia(type, src, cls, name) {
  const div = document.createElement("div");
  div.className = "msg " + cls;

  if (type === "image") {
    div.innerHTML = `<img src="${src}" />`;
  } else if (type === "audio") {
    div.innerHTML = `<audio controls src="${src}"></audio>`;
  } else if (type === "video") {
    div.innerHTML = `<video controls src="${src}"></video>`;
  } else {
    div.innerHTML = `
      <div class="file">
        📄 <a href="${src}" download>${name}</a>
      </div>
    `;
  }

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const text = input.value.trim();
  const file = fileInput.files[0];

  if (!text && !file) return;

  if (text) {
    addMessage(text, "user");

    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text })
    });

    const data = await res.json();
    addMessage(data.reply, "bot");
    input.value = "";
  }

  if (file) {
    const url = URL.createObjectURL(file);
    const type = file.type;

    if (type.startsWith("image")) addMedia("image", url, "user");
    else if (type.startsWith("audio")) addMedia("audio", url, "user");
    else if (type.startsWith("video")) addMedia("video", url, "user");
    else addMedia("file", url, "user", file.name);

    fileInput.value = "";
  }
}
</script>

</body>
</html>
