<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Joel XMD Chat</title>
  <style>
    body { background:#0b0f19;color:white;font-family:sans-serif }
    #chat { max-width:420px;margin:auto;padding:10px }
    .msg { padding:8px;margin:6px;border-radius:8px }
    .user { background:#2563eb;text-align:right }
    .bot { background:#1e293b }
    input { width:100%;padding:10px;border:none }
  </style>
</head>
<body>

<div id="chat"></div>
<input id="input" placeholder="Type .menu" />

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");

input.addEventListener("keydown", async e => {
  if (e.key === "Enter") {
    const text = input.value;
    input.value = "";
    chat.innerHTML += `<div class="msg user">${text}</div>`;

    const res = await fetch("/api/chat", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ message: text })
    });

    const data = await res.json();
    chat.innerHTML += `<div class="msg bot">${data.reply}</div>`;
    chat.scrollTop = chat.scrollHeight;
  }
});
</script>

</body>
</html>
